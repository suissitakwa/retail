[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "java -XX:MaxRAMPercentage=35.0 -XX:+UseContainerSupport -XX:MaxMetaspaceSize=160m -XX:ReservedCodeCacheSize=64m -jar app.jar"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# ── Required environment variables (set in Railway dashboard) ────────────────
#
# From Railway Postgres plugin (reference with ${{Postgres.VARIABLE}}):
#   SPRING_DATASOURCE_URL      = jdbc:${{Postgres.DATABASE_URL}}
#   SPRING_DATASOURCE_USERNAME = ${{Postgres.PGUSER}}
#   SPRING_DATASOURCE_PASSWORD = ${{Postgres.PGPASSWORD}}
#
# Profile & feature flags:
#   SPRING_PROFILES_ACTIVE  = prod
#   KAFKA_ENABLED           = false
#   SPRING_CACHE_TYPE       = none
#
# Secrets (set as Railway secret variables):
#   STRIPE_SECRET_KEY       = sk_live_...
#   STRIPE_WEBHOOK_SECRET   = whsec_...
#   JWT_SECRET_KEY          = <32+ char random string>
#   OPENAI_API_KEY          = sk-...
#
# CORS / Stripe redirects (update to your Netlify URL):
#   APP_CORS_ALLOWED_ORIGINS = https://retail-novamart.netlify.app
#   APP_FRONTEND_BASE_URL    = https://retail-novamart.netlify.app
