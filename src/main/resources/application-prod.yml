spring:
  # No Redis instance on Railway — exclude its auto-config so Lettuce/Netty
  # never initialize (they allocate off-heap direct memory that pushes the
  # container past its 1 GB RSS limit).
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  datasource:
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    admin:
      fail-fast: false
      properties:
        request.timeout.ms: 3000
        retry.backoff.ms: 1000
        default.api.timeout.ms: 5000
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    consumer:
      group-id: retail-backend
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.retail_project.*"
        spring.json.add.type.headers: false
    listener:
      # No Kafka broker on Railway — default OFF so the consumer never blocks
      # startup trying to reach localhost:9092. Set KAFKA_ENABLED=true only
      # where a real broker exists.
      auto-startup: ${KAFKA_ENABLED:false}

  cache:
    type: ${SPRING_CACHE_TYPE:none}

server:
  tomcat:
    threads:
      max: 20
      min-spare: 2

management:
  health:
    redis:
      enabled: false
    kafka:
      enabled: false
