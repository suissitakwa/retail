spring:
  # Datasource is auto-configured by @ServiceConnection (Testcontainers)
  flyway:
    enabled: true   # run real migrations against the container DB

  # Kafka: keep auto-config ON so KafkaTemplate bean is created (required by PaymentProducer/OrderProducer)
  # but prevent any real broker connection at startup
  kafka:
    bootstrap-servers: localhost:19092   # dummy — no actual broker needed for auth/product tests
    listener:
      auto-startup: false               # don't start @KafkaListener consumers
    admin:
      fail-fast: false                  # don't crash if broker unreachable at startup

  # Disable Redis only — not needed for integration tests
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
  cache:
    type: none

# Dummy values — no real Stripe/JWT calls in integration tests
stripe:
  secret-key: sk_test_dummy_itest
  webhook:
    secret: whsec_dummy_itest

application:
  security:
    jwt:
      secret-key: dGVzdC1zZWNyZXQta2V5LXRoYXQtaXMtbG9uZy1lbm91Z2g=
      expiration: 8640000
      refresh-expiration: 604800000

app:
  frontend:
    base-url: http://localhost:3000
