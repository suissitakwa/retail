server:
  port: ${PORT:8080}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_missing}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET:whsec_missing}
  api-version: "2024-06-20"

spring:
  application:
    name: retail

  jpa:
    hibernate:
      ddl-auto: none
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  hikari:
    max-lifetime: 580000
    idle-timeout: 540000
    connection-timeout: 30000


  flyway:
    enabled: true
    clean-disabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: 8640000
      refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318/v1/traces}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"

app:
  frontend:
    base-url: ${APP_FRONTEND_BASE_URL:http://localhost:3000}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}

resilience4j:
  circuitbreaker:
    instances:
      stripe:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
        record-exceptions:
          - com.stripe.exception.StripeException
        ignore-exceptions:
          - java.lang.RuntimeException
      openai:
        sliding-window-size: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 2
